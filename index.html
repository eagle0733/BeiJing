<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>老北京隨身帳 🏮</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --palace-red: #B22222;
            --palace-gold: #D4AF37;
            --paper-bg: #FDF5E6;
            --ink-black: #3E2723;
        }

        body {
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            background-color: var(--paper-bg);
            color: var(--ink-black);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        h1 {
            color: var(--palace-red);
            text-align: center;
            border-bottom: 3px double var(--palace-red);
            padding-bottom: 10px;
            letter-spacing: 2px;
        }

        /* 記帳表單樣式 */
        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            border-left: 8px solid var(--palace-gold);
            box-shadow: 4px 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        label { display: block; margin-top: 10px; font-weight: bold; }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--palace-red);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            margin-top: 15px;
            cursor: pointer;
        }

        button:active { background-color: #8B0000; }

        /* 總計與列表 */
        .total-display {
            text-align: center;
            font-size: 24px;
            color: var(--palace-red);
            font-weight: bold;
            margin: 20px 0;
        }

        .expense-item {
            background: #fff;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
        }

        .item-info { flex: 1; }
        .item-info .title { font-weight: bold; display: block; }
        .item-info .meta { font-size: 12px; color: #666; }
        .item-amount { color: var(--palace-red); font-weight: bold; font-size: 18px; }

        .delete-btn {
            color: #ccc;
            margin-left: 15px;
            cursor: pointer;
        }

        /* 行程提示 */
        .itinerary-hint {
            font-size: 13px;
            background: #f1ede4;
            padding: 10px;
            border-radius: 4px;
            margin-top: 20px;
            color: #5d4037;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🏮 老北京隨身帳</h1>
    
    <div class="card">
        <label>消費項目</label>
        <input type="text" id="item" placeholder="例如：宮宴晚餐">
        
        <div style="display: flex; gap: 10px;">
            <div style="flex: 1;">
                <label>金額 (RMB)</label>
                <input type="number" id="amount" placeholder="0.0">
            </div>
            <div style="flex: 1;">
                <label>類別</label>
                <select id="category">
                    <option value="餐飲">餐飲</option>
                    <option value="交通">交通</option>
                    <option value="門票">門票</option>
                    <option value="購物">購物</option>
                </select>
            </div>
        </div>
        <button onclick="addExpense()"><i class="fa-solid fa-pen-nib"></i> 登記存檔</button>
    </div>

    <div class="total-display">
        總計支出：¥ <span id="totalPrice">0.00</span>
    </div>

    <div id="expenseList">
        </div>

    <div class="itinerary-hint">
        <strong>📌 今日行程備忘：</strong><br>
        <span id="todayPlan">正在讀取行程...</span>
    </div>
</div>

<script>
    // 您的北京行程資料
    const itinerary = {
        "05-16": "Day 1: 桃園→北京、京劇、前門大街(素虎)",
        "05-17": "Day 2: 故宮、雍和宮(茶缽齋)、什剎海",
        "05-18": "Day 3: 慕田峪長城、水立方/鳥巢、三里屯",
        "05-19": "Day 4: 天安門、宮宴、圓明園/頤和園",
        "05-20": "Day 5: 天壇、功德林素齋、賦歸"
    };

    let expenses = JSON.parse(localStorage.getItem('beijing_expenses')) || [];

    function updateUI() {
        const list = document.getElementById('expenseList');
        const totalDisp = document.getElementById('totalPrice');
        list.innerHTML = '';
        let total = 0;

        expenses.forEach((ex, index) => {
            total += parseFloat(ex.amount);
            list.innerHTML += `
                <div class="expense-item">
                    <div class="item-info">
                        <span class="title">${ex.item}</span>
                        <span class="meta">${ex.date} | ${ex.category}</span>
                    </div>
                    <div class="item-amount">¥${ex.amount}</div>
                    <i class="fa-solid fa-trash-can delete-btn" onclick="deleteExpense(${index})"></i>
                </div>
            `;
        });

        totalDisp.innerText = total.toFixed(2);
        localStorage.setItem('beijing_expenses', JSON.stringify(expenses));
        showTodayPlan();
    }

    function addExpense() {
        const item = document.getElementById('item').value;
        const amount = document.getElementById('amount').value;
        const category = document.getElementById('category').value;
        
        if(!item || !amount) { alert("請填寫項目與金額"); return; }

        const date = new Date().toLocaleDateString('zh-TW', {month:'2-digit', day:'2-digit'});
        expenses.unshift({ item, amount, category, date });
        
        // 清空輸入框
        document.getElementById('item').value = '';
        document.getElementById('amount').value = '';
        updateUI();
    }

    function deleteExpense(index) {
        if(confirm("確定刪除這筆帳目嗎？")) {
            expenses.splice(index, 1);
            updateUI();
        }
    }

    function showTodayPlan() {
        const today = new Date().toLocaleDateString('zh-TW', {month:'2-digit', day:'2-digit'}).replace('/', '-');
        document.getElementById('todayPlan').innerText = itinerary[today] || "今天放鬆心情，隨意逛逛吧！";
    }

    // 初始讀取
    updateUI();
</script>

</body>
</html>
